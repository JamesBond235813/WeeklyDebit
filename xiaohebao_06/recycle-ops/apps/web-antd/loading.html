<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f4f7f9;
  }

  .loading.hidden {
    pointer-events: none;
    visibility: hidden;
    opacity: 0;
    transition: all 0.6s ease-out;
  }

  .dark .loading {
    background-color: #0d0d10;
  }

  .loading .logo {
    width: 110px;
    height: auto;
    filter: drop-shadow(0 10px 18px rgb(0 0 0 / 12%));
  }

  .loading .title {
    margin-top: 28px;
    font-size: 26px;
    font-weight: 600;
    color: rgb(0 0 0 / 85%);
    letter-spacing: 2px;
  }

  .dark .loading .title {
    color: rgb(255 255 255 / 88%);
  }
</style>
<div class="loading" id="__app-loading__">
  <img class="logo" src="%VITE_APP_LOGO_SOURCE%" alt="%VITE_APP_LOGO_ALT%" />
  <div class="title">%VITE_APP_LOADING_TEXT%</div>
</div>
