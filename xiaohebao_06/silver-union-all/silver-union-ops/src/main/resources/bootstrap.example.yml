spring:
  application:
    name: shaowen-ops
  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 2MB
  datasource:
    db-name: weeklydebit
    username: weeklydebit_user
    password: ${WEEKLYDEBIT_DB_PASSWORD:change-me}
    db-host: ${WEEKLYDEBIT_DB_HOST:127.0.0.1:3306}
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${spring.datasource.db-host}/${spring.datasource.db-name}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&serverTimezone=GMT%2B8
    hikari:
      minimum-idle: 5
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: shaowen-POOL
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      validationTimeout: 5000
      leak-detection-threshold: 600000

server:
  port: ${WEEKLYDEBIT_SERVER_PORT:32800}
  servlet:
    context-path: /api

logging:
  pathPrefix: ./logs
  level:
    root: info
    com:
      jhl:
        silver:
          union: info

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configurationProperties:
    default-statement-timeout: 60
  configuration:
    defaultStatementTimeout: 100

biz:
  enable-login-time-limit: false
  importCustTemplateFilePath: ${WEEKLYDEBIT_IMPORT_TEMPLATE_PATH:./src/main/resources/templates/客户信息模板1.0.xlsx}
  extraToken: ${WEEKLYDEBIT_EXTRA_TOKEN:change-me}
  pushCustAesKey: ${WEEKLYDEBIT_PUSH_CUST_AES_KEY:}
